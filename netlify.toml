# Netlify configuration — lives in the repo so deploys don't depend on
# dashboard settings. The site is the Next.js app in website/.
[build]
  base = "website"
  command = "npm run build"
  # Explicit publish path — overrides any UI value (a UI publish dir of
  # "website" collides with the base dir and fails the Next.js plugin)
  publish = "website/.next"

# Netlify's Next.js runtime: handles SSG output, redirects from
# next.config.ts, image serving, and routing. Without this the deploy
# publishes raw .next build files and every URL 404s.
[[plugins]]
  package = "@netlify/plugin-nextjs"
